name: Build Android App

on:
  push:
    branches:
      - main
      - 'claude/**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('CalDayAndroid/**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: CalDayAndroid
        run: ./gradlew assembleDebug

      - name: Build release APK
        working-directory: CalDayAndroid
        run: ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fukusuke-android-debug
          path: CalDayAndroid/app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: fukusuke-android-release
          path: CalDayAndroid/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: CalDayAndroid/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
